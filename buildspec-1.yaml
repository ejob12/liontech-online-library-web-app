version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto8
    commands:
      - apt update -y
  pre_build:
    commands:
      - echo "Running pre-build phase..."
      - mvn clean package
      - echo Logging in to Amazon ECR...
      - aws --version
      - REPOSITORY_URI=101257774115.dkr.ecr.us-east-1.amazonaws.com/javatechie-registry
      - aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin $REPOSITORY_URI
      - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c 1-7)
      - IMAGE_TAG=build-$(echo $CODEBUILD_BUILD_ID | awk -F":" '{print $2}')
  build:
    commands:
      - echo Build started on `date`
      - echo Building the Docker image...
      - docker build -t javatechie-registry .
      - docker tag javatechie-registry:latest $REPOSITORY_URI:latest
      - docker tag javatechie-registry:latest $REPOSITORY_URI:$IMAGE_TAG
  post_build:
    commands:
      - echo Build completed on `date`
      - echo Pushing the Docker images...
      - docker push $REPOSITORY_URI:latest
      - docker push $REPOSITORY_URI:$IMAGE_TAG
      - echo Writing image definitions file...
      - printf '[{"name":"javatechie-registry","imageUri":"%s"}]' $REPOSITORY_URI:$IMAGE_TAG > imagedefinitions.json
      - echo printing imagedefinitions.json
      - cat imagedefinitions.json

artifacts:
  files:
    - imagedefinitions.json
    - target/*.war
    - appspec.yaml
    - scripts/*
